<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorting Office — Spam Message Detector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="grain"></div>

  <header class="masthead">
    <div class="masthead-inner">
      <div class="mark">
        <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
          <rect x="1" y="6" width="32" height="22" rx="2" stroke="currentColor" stroke-width="1.6"/>
          <path d="M2 8L17 20L32 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="masthead-text">
        <p class="eyebrow">Automated Sorting Office</p>
        <h1>The Spam Filter Desk</h1>
      </div>
      <div class="masthead-meta">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText">checking desk…</span>
      </div>
    </div>
  </header>

  <main class="floor">
    <section class="desk">
      <div class="slip">
        <div class="slip-head">
          <span class="slip-label">Correspondence for review</span>
          <span class="slip-count" id="charCount">0 / 5000</span>
        </div>
        <textarea
          id="messageInput"
          placeholder="Paste or type the message you want inspected — e.g. an SMS, an email body, a DM…"
          maxlength="5000"
        ></textarea>
        <div class="slip-foot">
          <div class="examples">
            <span>Try:</span>
            <button class="chip" data-sample="Congratulations! You've WON a $1000 Walmart gift card. Click here to claim now!!! Limited time offer.">gift card scam</button>
            <button class="chip" data-sample="Hey, are we still on for lunch tomorrow at 1pm? Let me know if that still works for you.">ordinary text</button>
            <button class="chip" data-sample="URGENT: Your account will be suspended. Verify your password immediately at this link to avoid closure.">phishing</button>
          </div>
          <button id="sortBtn" class="sort-btn">
            <span class="sort-btn-label">Sort message</span>
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

      <div class="tray-row">
        <div class="tray tray-ham" id="trayHam">
          <span class="tray-label">HAM<br><small>legitimate</small></span>
        </div>
        <div class="conveyor" id="conveyor">
          <div class="envelope" id="envelope">
            <svg viewBox="0 0 60 40" width="60" height="40">
              <rect x="1" y="1" width="58" height="38" rx="2" fill="#F4EFE3" stroke="#8B7E63" stroke-width="1.3"/>
              <path d="M2 3L30 24L58 3" fill="none" stroke="#8B7E63" stroke-width="1.3"/>
            </svg>
          </div>
        </div>
        <div class="tray tray-spam" id="traySpam">
          <span class="tray-label">SPAM<br><small>unsolicited</small></span>
        </div>
      </div>

      <div class="result" id="resultPanel" hidden>
        <div class="stamp" id="stampMark"></div>
        <div class="result-text">
          <p class="result-verdict" id="resultVerdict"></p>
          <p class="result-detail" id="resultDetail"></p>
        </div>
      </div>

      <p class="error" id="errorText" hidden></p>
    </section>

    <footer class="ledger">
      <p>Model: TF-IDF vectorizer → logistic regression, trained on 5,572 labelled SMS messages.</p>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
